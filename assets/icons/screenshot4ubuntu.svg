<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="20" y="20" width="472" height="472" rx="92" ry="92" fill="url(#bg)"/>

  <!-- Screenshot frame: 4 corner brackets -->
  <g stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-opacity="0.94" fill="none">
    <!-- Top-left -->
    <line x1="102" y1="102" x2="102" y2="174"/>
    <line x1="102" y1="102" x2="174" y2="102"/>
    <!-- Top-right -->
    <line x1="410" y1="102" x2="410" y2="174"/>
    <line x1="410" y1="102" x2="338" y2="102"/>
    <!-- Bottom-left -->
    <line x1="102" y1="410" x2="102" y2="338"/>
    <line x1="102" y1="410" x2="174" y2="410"/>
    <!-- Bottom-right -->
    <line x1="410" y1="410" x2="410" y2="338"/>
    <line x1="410" y1="410" x2="338" y2="410"/>
  </g>

  <!-- Subtle crosshair lines -->
  <g stroke="#ffffff" stroke-width="2" stroke-opacity="0.23">
    <!-- Horizontal -->
    <line x1="143" y1="256" x2="189" y2="256"/>
    <line x1="323" y1="256" x2="369" y2="256"/>
    <!-- Vertical -->
    <line x1="256" y1="143" x2="256" y2="189"/>
    <line x1="256" y1="323" x2="256" y2="369"/>
  </g>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="84" fill="none" stroke="#ffffff" stroke-width="6" stroke-opacity="0.2"/>

  <!-- Main lens circle -->
  <circle cx="256" cy="256" r="69" fill="none" stroke="#ffffff" stroke-width="13" stroke-opacity="0.86"/>

  <!-- Inner filled circle -->
  <circle cx="256" cy="256" r="49" fill="#ffffff" fill-opacity="0.31"/>

  <!-- Core dot -->
  <circle cx="256" cy="256" r="16" fill="#ffffff" fill-opacity="0.9"/>

  <!-- Highlight on top-left of lens -->
  <ellipse cx="226" cy="221" rx="26" ry="15" fill="#ffffff" fill-opacity="0.2" transform="rotate(-15 226 221)"/>
</svg>
